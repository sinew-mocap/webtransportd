name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to build and release (e.g. v0.1.0)
        required: true

permissions:
  contents: write

jobs:
  windows:
    name: windows-mingw
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install MSYS2 + mingw-w64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Build (release, no sanitizer)
        run: |
          cmake -B build -DNO_SANITIZER=ON -G Ninja
          cmake --build build --target webtransportd --parallel

      - name: Smoke
        run: ./webtransportd.exe --version

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: webtransportd.exe
          fail_on_unmatched_files: true
