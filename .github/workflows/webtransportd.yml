# Cycle 58: CMake build — linux-gcc, macos-clang, windows-mingw.
#
# All three jobs use the vendored thirdparty tree (picoquic/picotls/mbedtls)
# — no external TLS package needed.  POSIX builds run ASAN + UBSAN by default;
# the release artifact is rebuilt without sanitizers so it runs standalone.
# Windows disables sanitizers (mingw-w64 ships no libasan).

name: webtransportd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

jobs:
  posix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-gcc,   os: ubuntu-latest, cc: gcc }
          - { name: macos-clang, os: macos-latest,  cc: clang }

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          ${{ matrix.cc }} --version
          cmake --version

      - name: cmake configure + build + test
        run: |
          cmake -B build -DCMAKE_C_COMPILER=${{ matrix.cc }}
          cmake --build build --parallel
          ctest --test-dir build --output-on-failure

      # Rebuild without sanitizers for the uploadable artifact.
      - name: Rebuild release binary (no sanitizers)
        run: |
          cmake -B build-release -DCMAKE_C_COMPILER=${{ matrix.cc }} -DNO_SANITIZER=ON
          cmake --build build-release --target webtransportd --parallel

      - name: daemon --version smoke
        run: ./webtransportd --version

      - name: Upload webtransportd binary
        uses: actions/upload-artifact@v4
        with:
          name: webtransportd-${{ matrix.name }}
          path: webtransportd
          if-no-files-found: error
          retention-days: 14

  windows:
    name: windows-mingw
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MSYS2 + mingw-w64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Show toolchain
        run: |
          gcc --version
          cmake --version

      - name: cmake configure + build + test (no sanitizer)
        run: |
          cmake -B build -DNO_SANITIZER=ON -G Ninja
          cmake --build build --parallel
          ctest --test-dir build --output-on-failure

      - name: daemon --version smoke
        run: ./webtransportd.exe --version

      - name: Upload webtransportd binary
        uses: actions/upload-artifact@v4
        with:
          name: webtransportd-windows-mingw
          path: webtransportd.exe
          if-no-files-found: error
          retention-days: 14
